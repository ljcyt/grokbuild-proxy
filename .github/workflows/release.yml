name: Release

on:
  push:
    tags:
      - "v*"

# Moving tags are promoted only by one serialized workflow, preventing an older
# backport or concurrent run from racing a newer release.
concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: grok2api-sso-to-grokbuild/requirements.txt
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Validate release tag
        run: |
          echo "$GITHUB_REF_NAME" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
      - name: Go formatting, vet, race tests, and build
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"
          go vet ./...
          go test -race ./... -count=1
          go build -trimpath ./cmd/grokbuild-proxy
      - name: Test SSO converter sidecar
        working-directory: grok2api-sso-to-grokbuild
        run: |
          python -m pip install -r requirements.txt
          PYTHONDONTWRITEBYTECODE=1 python -m unittest discover -s tests -v
      - name: Validate Compose and build both images
        env:
          SSO_CONVERTER_API_TOKEN: release-validation-only
          GROKBUILD_CONTAINER_TAG: 0.0.0-validation
        run: |
          docker compose --profile sso-import config
          docker compose -f docker-compose.release.yml --profile sso-import config
          docker build --build-arg VERSION="${GITHUB_REF_NAME#v}" -t grokbuild-proxy:release-validation .
          docker build -t grokbuild-proxy-sso-import:release-validation ./grok2api-sso-to-grokbuild
      - name: Build all release archives and SBOMs without publishing
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=before
      - name: Verify six-platform release payload
        env:
          REQUIRE_SBOM: "1"
        run: sh scripts/verify-release-archive.sh dist

  container_exact:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      proxy_image: ${{ steps.names.outputs.proxy }}
      sidecar_image: ${{ steps.names.outputs.sidecar }}
      version: ${{ steps.names.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: names
        name: Resolve image names and revision staging tag
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          repository="${REPOSITORY,,}"
          {
            echo "proxy=ghcr.io/${repository}"
            echo "sidecar=ghcr.io/${repository}-sso-import"
            echo "version=${GITHUB_REF_NAME#v}"
            echo "staging=sha-${GITHUB_SHA}"
          } >> "$GITHUB_OUTPUT"
      - id: proxy_build
        name: Publish revision-staged proxy image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ steps.names.outputs.version }}
          tags: ${{ steps.names.outputs.proxy }}:${{ steps.names.outputs.staging }}
          labels: |
            org.opencontainers.image.version=${{ steps.names.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
      - id: sidecar_build
        name: Publish revision-staged SSO import sidecar image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ./grok2api-sso-to-grokbuild
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.names.outputs.sidecar }}:${{ steps.names.outputs.staging }}
          labels: |
            org.opencontainers.image.version=${{ steps.names.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true
      - name: Verify staged manifests and promote immutable exact tags
        env:
          PROXY_IMAGE: ${{ steps.names.outputs.proxy }}
          SIDECAR_IMAGE: ${{ steps.names.outputs.sidecar }}
          VERSION: ${{ steps.names.outputs.version }}
          STAGING: ${{ steps.names.outputs.staging }}
          REVISION: ${{ github.sha }}
          PROXY_DIGEST: ${{ steps.proxy_build.outputs.digest }}
          SIDECAR_DIGEST: ${{ steps.sidecar_build.outputs.digest }}
        run: |
          set -euo pipefail

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          validate_manifest() {
            local ref="$1"
            local manifest="$2"
            local expected_digest="${3:-}"
            docker buildx imagetools inspect --format '{{json .}}' "$ref" > "$manifest"
            jq -e --arg revision "$REVISION" --arg version "$VERSION" --arg digest "$expected_digest" '
              . as $root |
              ($digest == "" or .manifest.digest == $digest) and
              ([.manifest.manifests[] | select(.platform.os != "unknown") |
                "\(.platform.os)/\(.platform.architecture)"] |
                sort == ["linux/amd64", "linux/arm64"]) and
              (["linux/amd64", "linux/arm64"] | all(. as $platform |
                (($root.image[$platform].config.Labels // $root.image[$platform].config.labels // {}) |
                  .["org.opencontainers.image.revision"] == $revision and
                  .["org.opencontainers.image.version"] == $version)))
            ' "$manifest" >/dev/null
          }

          exact_state() {
            local ref="$1"
            local output="$2"
            local error_output="$3"
            # Probe only the top-level manifest here. If it exists but a child
            # manifest/config is corrupt, the later full validation must fail;
            # that condition must never be mistaken for an absent exact tag.
            if docker buildx imagetools inspect --raw "$ref" > "$output" 2> "$error_output"; then
              echo present
              return 0
            fi
            if grep -Eqi '(manifest unknown|name unknown|: not found|404 not found)$' "$error_output"; then
              echo absent
              return 0
            fi
            echo "could not determine whether immutable tag exists: $ref" >&2
            cat "$error_output" >&2
            return 1
          }

          ensure_exact() {
            local image="$1"
            local digest="$2"
            local staged_ref="${image}@${digest}"
            local exact_ref="${image}:${VERSION}"
            local staged_manifest
            local exact_manifest
            local exact_error
            local state
            staged_manifest="$work/staged-$(basename "$image").json"
            exact_manifest="$work/exact-$(basename "$image").json"
            exact_error="$work/exact-$(basename "$image").err"

            validate_manifest "$staged_ref" "$staged_manifest" "$digest"
            state="$(exact_state "$exact_ref" "$exact_manifest" "$exact_error")"
            if [ "$state" = present ]; then
              if ! validate_manifest "$exact_ref" "$exact_manifest"; then
                echo "immutable tag exists but is not a complete build of revision $REVISION: $exact_ref" >&2
                return 1
              fi
              echo "immutable tag already points to revision $REVISION: $exact_ref"
              return 0
            fi

            docker buildx imagetools create --tag "$exact_ref" "$staged_ref"
            validate_manifest "$exact_ref" "$exact_manifest" "$digest"
          }

          # Both products must pass staging validation before either immutable
          # version tag is created. A later promotion failure is recoverable:
          # reruns accept only a complete exact tag carrying this revision.
          validate_manifest "${PROXY_IMAGE}:${STAGING}" "$work/preflight-proxy.json" "$PROXY_DIGEST"
          validate_manifest "${SIDECAR_IMAGE}:${STAGING}" "$work/preflight-sidecar.json" "$SIDECAR_DIGEST"
          ensure_exact "$PROXY_IMAGE" "$PROXY_DIGEST"
          ensure_exact "$SIDECAR_IMAGE" "$SIDECAR_DIGEST"

  release:
    needs: [validate, container_exact]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: v3.1.1
      - name: Build archives, checksums, and SBOMs without publishing
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - name: Verify local release payload
        env:
          REQUIRE_SBOM: "1"
        run: sh scripts/verify-release-archive.sh dist
      - name: Sign checksum manifest
        run: |
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.sigstore.json \
            dist/checksums.txt
        env:
          COSIGN_YES: "true"
      - name: Publish the verified GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REVISION: ${{ github.sha }}
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          expected_revision="$(git rev-list -n 1 "$tag")"
          if [ "$expected_revision" != "$REVISION" ]; then
            echo "release tag resolves to $expected_revision, expected $REVISION" >&2
            exit 1
          fi

          mapfile -t assets < <(awk '{ print "dist/" $2 }' dist/checksums.txt)
          assets+=(dist/checksums.txt dist/checksums.txt.sigstore.json)
          if [ "${#assets[@]}" -ne 14 ]; then
            echo "expected exactly 14 release assets, found ${#assets[@]}" >&2
            exit 1
          fi
          for asset in "${assets[@]}"; do
            if [ ! -f "$asset" ] || [ -L "$asset" ]; then
              echo "release asset is missing or is not a regular file: $asset" >&2
              exit 1
            fi
          done

          prerelease=false
          release_flags=(--verify-tag --generate-notes --target "$REVISION")
          if [[ "$version" == *-* ]]; then
            prerelease=true
            release_flags+=(--prerelease --latest=false)
          fi

          release_json="$(mktemp)"
          release_error="$(mktemp)"
          trap 'rm -f "$release_json" "$release_error"' EXIT
          if gh release view "$tag" --json databaseId,isDraft,isPrerelease,tagName,assets > "$release_json" 2> "$release_error"; then
            if [ "$(jq -r '.tagName' "$release_json")" != "$tag" ] ||
               [ "$(jq -r '.isPrerelease' "$release_json")" != "$prerelease" ]; then
              echo "existing release metadata does not match $tag" >&2
              exit 1
            fi
            if [ "$(jq -r '.isDraft' "$release_json")" = true ]; then
              gh release upload "$tag" "${assets[@]}" --clobber
            fi
          elif grep -Fqi 'release not found' "$release_error"; then
            gh release create "$tag" "${assets[@]}" "${release_flags[@]}"
          else
            echo "could not determine whether GitHub Release exists" >&2
            cat "$release_error" >&2
            exit 1
          fi

          gh release view "$tag" --json databaseId,isDraft,isPrerelease,tagName,assets > "$release_json"
          for asset in "${assets[@]}"; do
            name="$(basename "$asset")"
            size="$(stat -c '%s' "$asset")"
            matches="$(jq --arg name "$name" --argjson size "$size" \
              '[.assets[] | select(.name == $name and .size == $size)] | length' "$release_json")"
            if [ "$matches" -ne 1 ]; then
              echo "published release must contain one size-matched asset: $name" >&2
              exit 1
            fi
          done
          if [ "$(jq '.assets | length' "$release_json")" -ne 14 ]; then
            echo "published release contains an unexpected asset set" >&2
            exit 1
          fi

          if [ "$(jq -r '.isDraft' "$release_json")" = true ]; then
            release_id="$(jq -r '.databaseId' "$release_json")"
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F draft=false -F prerelease="$prerelease" >/dev/null
            gh release view "$tag" --json isDraft --jq '.isDraft == false' | grep -Fx true
          fi

  promote:
    needs: [container_exact, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote monotonic moving tags for both verified images
        env:
          PROXY_IMAGE: ${{ needs.container_exact.outputs.proxy_image }}
          SIDECAR_IMAGE: ${{ needs.container_exact.outputs.sidecar_image }}
          VERSION: ${{ needs.container_exact.outputs.version }}
        run: |
          case "$VERSION" in
            *-*)
              echo "prerelease ${VERSION}: exact tags only"
              exit 0
              ;;
          esac

          current="v${VERSION}"
          major="${VERSION%%.*}"
          remainder="${VERSION#*.}"
          minor="${remainder%%.*}"
          stable_re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          latest_global="$(git tag --list 'v*' --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"
          latest_major="$(git tag --list "v${major}.*" --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"
          latest_minor="$(git tag --list "v${major}.${minor}.*" --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"

          aliases=""
          if [ "$current" = "$latest_minor" ]; then aliases="$aliases ${major}.${minor}"; fi
          if [ "$current" = "$latest_major" ]; then aliases="$aliases ${major}"; fi
          if [ "$current" = "$latest_global" ]; then aliases="$aliases latest"; fi

          docker buildx imagetools inspect "${PROXY_IMAGE}:${VERSION}" >/dev/null
          docker buildx imagetools inspect "${SIDECAR_IMAGE}:${VERSION}" >/dev/null
          for alias in $aliases; do
            docker buildx imagetools create --tag "${PROXY_IMAGE}:${alias}" "${PROXY_IMAGE}:${VERSION}"
            docker buildx imagetools create --tag "${SIDECAR_IMAGE}:${alias}" "${SIDECAR_IMAGE}:${VERSION}"
            docker buildx imagetools inspect "${PROXY_IMAGE}:${alias}" >/dev/null
            docker buildx imagetools inspect "${SIDECAR_IMAGE}:${alias}" >/dev/null
          done
